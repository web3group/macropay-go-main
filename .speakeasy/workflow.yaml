workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    Macropay-OAS:
        inputs:
            - location: https://api.macropay.sh/openapi.json
        overlays:
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/security.yml
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/type_parameter.yml
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/read_only.yml
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/event_discriminator.yml
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/timezone_enum.yml
            - location: https://raw.githubusercontent.com/macrodeep/macropay/main/sdk/overlays/event_metadata.yml
        registry:
            location: registry.speakeasyapi.dev/macropay/macropay/macropay-oas
targets:
    macropay:
        target: go
        source: Macropay-OAS
        codeSamples:
            output: codeSamples.yaml
            registry:
                location: registry.speakeasyapi.dev/macropay/macropay/macropay-oas-code-samples-go
            labelOverride:
                fixedValue: Go (SDK)
